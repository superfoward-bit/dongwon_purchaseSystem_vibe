# ===== SonarCloud 프로젝트 식별 =====
sonar.projectKey=superfoward-bit_dongwon_purchaseSystem_vibe
sonar.organization=superfoward-bit

# ===== 분석 대상 소스 =====
# 백엔드(Java) + 프론트(Vue/TS) + DB(PL/SQL)
sonar.sources=backend/src/main,frontend/src,db

# ===== Java "완전 분석"용 컴파일 결과물 =====
# GitHub Actions에서 ./gradlew classes 로 생성되는 .class 위치.
# 이게 있어야 0 나누기 같은 논리 버그까지 잡힌다.
sonar.java.binaries=backend/build/classes/java/main

# ===== 인코딩 =====
sonar.sourceEncoding=UTF-8

# ===== 분석 제외 (빌드 산출물/외부 라이브러리) =====
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.min.js
